<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>rank★d</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/list.css" />
  <link rel="stylesheet" href="css/detail.css" />
  <link rel="stylesheet" href="css/entry.css" />
  <link rel="stylesheet" href="css/stats.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

  <!-- SPLASH -->
  <div id="splash" class="splash">
    <img class="splash-logo" src="logo.png" alt="rank★d" />
    <div class="splash-dots"><span></span><span></span><span></span><span></span></div>
  </div>

  <!-- APP SHELL -->
  <div id="app" class="hidden">

    <!-- HEADER -->
    <header class="app-header">
      <img class="header-logo" src="logo.svg" alt="rank★d" />
      <div class="header-actions">
        <button class="header-icon-btn active" data-state="reviews" aria-label="Recensioni">
          <i data-lucide="layout-grid"></i>
        </button>
        <button class="header-icon-btn" data-state="progress" aria-label="In corso">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
            <circle cx="12" cy="12" r="9" stroke-dasharray="32 60" stroke-dashoffset="-16"/>
            <polyline points="8.5 12 11 14.5 15.5 9.5"/>
          </svg>
        </button>
        <button class="header-icon-btn" data-state="wishlist" aria-label="Wishlist">
          <i data-lucide="bookmark"></i>
        </button>
        <button class="header-icon-btn" data-state="stats" aria-label="Statistiche">
          <i data-lucide="bar-chart-2"></i>
        </button>
      </div>
    </header>

    <!-- ICONE CATEGORIA — fisse sopra (absolute), non scorrono -->
    <nav class="cat-tabs" id="cat-tabs">
      <button class="cat-tab active" data-cat="ALL"   aria-label="Tutte"></button>
      <button class="cat-tab"        data-cat="FILM"  aria-label="Film"></button>
      <button class="cat-tab"        data-cat="SERIE" aria-label="Serie"></button>
      <button class="cat-tab"        data-cat="GAME"  aria-label="Game"></button>
      <button class="cat-tab"        data-cat="COMIC" aria-label="Comics"></button>
    </nav>

    <!-- DECK: la folder colorata (con gobba) scorre SOTTO le icone fisse -->
    <div id="cat-deck" class="cat-deck">
      <div id="folder-track" class="folder-track">
        <!-- ogni cartella = SVG colorato con gobba sotto la propria icona (generato da JS) -->
      </div>
      <!-- lista card: overlay sopra la cartella attiva, si nasconde durante il drag -->
      <div id="list-scroll" class="list-scroll">
        <div id="reviews-list" class="reviews-list"></div>
      </div>
    </div>

    <!-- STATS VIEW (fuori dal deck) -->
    <div id="stats-view" class="stats-view hidden">
      <div class="stats-scroll">
        <div class="stats-hero">
          <div class="stats-hero-item">
            <div class="stats-hero-num" id="stats-total">0</div>
            <div class="stats-hero-label">Totale</div>
          </div>
          <div class="stats-hero-item">
            <div class="stats-hero-num" id="stats-avg">—</div>
            <div class="stats-hero-label">Media</div>
          </div>
          <div class="stats-hero-item">
            <div class="stats-hero-num" id="stats-wishlist">0</div>
            <div class="stats-hero-label">Wish</div>
          </div>
          <div class="stats-hero-item">
            <div class="stats-hero-num" id="stats-progress">0</div>
            <div class="stats-hero-label">In corso</div>
          </div>
        </div>
        <div class="stats-card">
          <div class="stats-section-label">Per categoria</div>
          <div id="stats-cat-list"></div>
        </div>
        <div class="stats-card">
          <div class="stats-section-label">Top 5</div>
          <div id="stats-top-list"></div>
        </div>
      </div>
    </div>

    <!-- FAB mezzo-fuori in basso al centro -->
    <button class="fab" id="fab-new" aria-label="Nuova voce">
      <span class="fab-star">★</span>
    </button>

  </div><!-- #app -->


  <!-- DETAIL MODAL (invariato) -->
  <div id="detail-modal" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal-box">
      <div class="detail-hero">
        <img id="detail-hero-img" class="detail-hero-img hidden" src="" alt="" />
        <img id="detail-hero-poster" class="detail-hero-poster hidden" src="" alt="" />
        <div id="detail-hero-placeholder" class="detail-hero-placeholder hidden"></div>
        <div class="detail-hero-gradient"></div>
        <button class="detail-close-btn" id="detail-close-btn" aria-label="Chiudi">
          <i data-lucide="x"></i>
        </button>
      </div>
      <div class="detail-body">

        <!-- ░░ VIEW MODE ░░ -->
        <div id="detail-view">
          <div class="detail-title" id="detail-title"></div>
          <div class="detail-meta-row">
            <span class="cat-badge" id="detail-cat-badge"></span>
            <span class="detail-rating stars" id="detail-rating"></span>
            <span class="detail-metadata" id="detail-metadata"></span>
            <span class="detail-date" id="detail-date"></span>
          </div>
          <div class="detail-section">
            <div class="detail-section-label">Recensione</div>
            <div class="detail-commento" id="detail-commento"></div>
          </div>
          <div id="detail-pros-cons-wrap" class="detail-section hidden">
            <div class="detail-pros-cons">
              <div class="detail-pros" id="detail-pros-section">
                <div class="detail-pc-label">Pro</div>
                <ul class="detail-pc-list" id="detail-pros-list"></ul>
              </div>
              <div class="detail-cons" id="detail-cons-section">
                <div class="detail-pc-label">Contro</div>
                <ul class="detail-pc-list" id="detail-cons-list"></ul>
              </div>
            </div>
          </div>
          <button class="btn-promote hidden" id="detail-promote-btn">Promuovi a Recensione</button>

          <!-- Azioni: modifica / rigenera -->
          <div class="detail-actions">
            <button class="btn-detail-action" id="detail-edit-btn">
              <i data-lucide="pencil"></i> Modifica
            </button>
            <button class="btn-detail-action hidden" id="detail-regen-btn">
              <i data-lucide="sparkles"></i> Rigenera
            </button>
          </div>
        </div>

        <!-- ░░ EDIT MODE ░░ -->
        <div id="detail-edit" class="hidden">
          <label class="edit-label">Titolo</label>
          <input type="text" id="edit-titolo" class="edit-input" />

          <div class="edit-row">
            <div class="edit-col">
              <label class="edit-label">Categoria</label>
              <select id="edit-categoria" class="edit-input">
                <option value="FILM">Film</option>
                <option value="SERIE">Serie</option>
                <option value="GAME">Game</option>
                <option value="COMIC">Comic</option>
              </select>
            </div>
            <div class="edit-col">
              <label class="edit-label">Voto</label>
              <select id="edit-rating" class="edit-input">
                <option value="0">—</option>
                <option value="0.5">0.5</option><option value="1">1</option>
                <option value="1.5">1.5</option><option value="2">2</option>
                <option value="2.5">2.5</option><option value="3">3</option>
                <option value="3.5">3.5</option><option value="4">4</option>
                <option value="4.5">4.5</option><option value="5">5</option>
              </select>
            </div>
          </div>

          <label class="edit-label">Stato</label>
          <select id="edit-stato" class="edit-input">
            <option value="">Recensito</option>
            <option value="WISH">Wishlist</option>
            <option value="IN_PROGRESS">In corso</option>
          </select>

          <label class="edit-label">Metadata <span class="edit-hint">(anno • autore • genere)</span></label>
          <input type="text" id="edit-metadata" class="edit-input" />

          <label class="edit-label">Recensione</label>
          <textarea id="edit-commento" class="edit-input edit-textarea" rows="5"></textarea>

          <div class="edit-row">
            <div class="edit-col">
              <label class="edit-label">Pro</label>
              <div id="edit-pros-list" class="edit-pc-list"></div>
              <button class="btn-pc-add" data-target="pros">+ Aggiungi pro</button>
            </div>
            <div class="edit-col">
              <label class="edit-label">Contro</label>
              <div id="edit-cons-list" class="edit-pc-list"></div>
              <button class="btn-pc-add" data-target="cons">+ Aggiungi contro</button>
            </div>
          </div>

          <div class="detail-actions">
            <button class="btn-detail-action btn-edit-cancel" id="detail-cancel-btn">Annulla</button>
            <button class="btn-detail-action btn-edit-save" id="detail-save-btn">Salva</button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- ENTRY MODAL -->
  <div id="entry-modal" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal-box">
      <div class="modal-header">
        <div class="modal-title">Nuova voce</div>
        <button class="icon-btn" id="entry-close-btn" aria-label="Chiudi">
          <i data-lucide="x"></i>
        </button>
      </div>
      <div class="entry-body">
        <p class="entry-hint">
          Scrivi come parli — l'AI sistema la forma mantenendo il tuo tono.<br>
          Es: "Dune parte 2, visivamente pazzesco, storia un po' lunga però. 4/5"
        </p>
        <textarea id="entry-textarea" class="entry-textarea" placeholder="Scrivi qui..." rows="5"></textarea>
      </div>
      <div class="entry-footer">
        <button class="btn-entry-cancel" id="entry-cancel-btn">Annulla</button>
        <button class="btn-entry-submit" id="entry-submit-btn">
          <i data-lucide="sparkles"></i>
          Pubblica
        </button>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/list.js"></script>
  <script src="js/detail.js"></script>
  <script src="js/entry.js"></script>
</body>
</html>
